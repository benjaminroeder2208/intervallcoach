// ── API Client ────────────────────────────────────────────────────────────────
const API_BASE = "/api";
let _accessToken = null;

async function apiRequest(method, path, body) {
  const headers = { "Content-Type": "application/json" };
  if (_accessToken) headers["Authorization"] = "Bearer " + _accessToken;
  const res = await fetch(API_BASE + path, {
    method,
    headers,
    credentials: "include",
    body: body ? JSON.stringify(body) : undefined
  });
  if (res.status === 401) {
    // Try silent refresh
    const refreshed = await tryRefreshToken();
    if (refreshed) {
      headers["Authorization"] = "Bearer " + _accessToken;
      const retry = await fetch(API_BASE + path, {
        method, headers, credentials: "include",
        body: body ? JSON.stringify(body) : undefined
      });
      if (!retry.ok) throw new Error(await retry.text());
      return retry.json();
    } else {
      _accessToken = null;
      window.__authLogout && window.__authLogout();
      throw new Error("Session abgelaufen");
    }
  }
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: "Unbekannter Fehler" }));
    throw new Error(err.error || "Serverfehler");
  }
  return res.json();
}

async function tryRefreshToken() {
  try {
    const res = await fetch(API_BASE + "/auth/refresh", {
      method: "POST", credentials: "include",
      headers: { "Content-Type": "application/json" }
    });
    if (!res.ok) return false;
    const data = await res.json();
    _accessToken = data.accessToken;
    return true;
  } catch { return false; }
}

// ── Root App with Auth Gate ───────────────────────────────────────────────────
function AppRoot() {
  const [user, setUser] = React.useState(null);       // null = not logged in
  const [authChecked, setAuthChecked] = React.useState(false); // silent refresh done?

  // Set global logout hook so apiRequest can trigger it
  React.useEffect(() => {
    window.__authLogout = () => setUser(null);
  }, []);

  // On mount: try silent token refresh (user may already have a valid cookie)
  React.useEffect(() => {
    tryRefreshToken().then(ok => {
      if (ok) {
        // Fetch user profile
        apiRequest("GET", "/auth/me").then(u => {
          setUser(u);
        }).catch(() => setUser(null)).finally(() => setAuthChecked(true));
      } else {
        setAuthChecked(true);
      }
    });
  }, []);

  const handleLogin = (userData) => setUser(userData);
  const handleLogout = async () => {
    try { await apiRequest("POST", "/auth/logout"); } catch {}
    _accessToken = null;
    setUser(null);
  };

  // Set theme on body before rendering
  React.useEffect(() => {
    const saved = localStorage.getItem("fit-theme") || "system";
    const resolved = saved === "system"
      ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
      : saved;
    document.body.className = resolved;
  }, []);

  if (!authChecked) {
    return React.createElement("div", {
      style: {
        minHeight: "100vh", background: "var(--bg)", display: "flex",
        alignItems: "center", justifyContent: "center",
        color: "var(--text3)", fontSize: 14, letterSpacing: 2
      }
    }, "LADEN...");
  }

  if (!user) {
    return React.createElement(AuthScreen, { onLogin: handleLogin });
  }

  return React.createElement(FitnessTimer, { user, onLogout: handleLogout });
}


// ── Audio ─────────────────────────────────────────────────────────────────────
function createRichTone(ctx, freq, dur, vol=1.0){
  const master = ctx.createGain();
  master.connect(ctx.destination);
  master.gain.setValueAtTime(0.001, ctx.currentTime);
  master.gain.linearRampToValueAtTime(vol, ctx.currentTime + 0.01);
  master.gain.setValueAtTime(vol, ctx.currentTime + dur * 0.6);
  master.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  [[freq, "square", 0.55], [freq*2, "sine", 0.30], [freq*0.5, "sine", 0.20], [freq*1.01, "sine", 0.15]].forEach(([f, type, amp])=>{
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.connect(g); g.connect(master);
    osc.type = type;
    osc.frequency.value = f;
    g.gain.value = amp;
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur + 0.05);
  });
}
function createClick(ctx){
  const buf = ctx.createBuffer(1, ctx.sampleRate * 0.03, ctx.sampleRate);
  const d   = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);
  const src = ctx.createBufferSource();
  const g   = ctx.createGain();
  src.buffer = buf; src.connect(g); g.connect(ctx.destination);
  g.gain.value = 0.6;
  src.start(ctx.currentTime);
}
function vibrate(pattern){
  if(window._fitTimerMuted)return;
  if(!('vibrate' in navigator))return;
  try{ navigator.vibrate(pattern); }catch(e){}
}
function signalStart(ctx){ createClick(ctx); createRichTone(ctx, 880, 0.18, 1.0); setTimeout(()=>createRichTone(ctx, 1320, 0.28, 1.0), 170); vibrate([0, 120]); }
function signalRest(ctx){ createRichTone(ctx, 660, 0.20, 0.9); setTimeout(()=>createRichTone(ctx, 440, 0.30, 0.9), 180); vibrate([0, 60, 80, 60]); }
function signalCountdown(ctx){ createClick(ctx); createRichTone(ctx, 880, 0.12, 0.85); vibrate(30); }
function signalHalfTime(ctx){ createRichTone(ctx, 1100, 0.14, 0.75); vibrate(50); }
function signalDone(ctx){ createClick(ctx); [[0,880],[160,1100],[320,1320],[500,1760]].forEach(([t,f])=>setTimeout(()=>createRichTone(ctx, f, 0.35, 1.0), t)); vibrate([0, 100, 80, 100, 80, 100, 80, 200]); }

// ── Streaks & Badges ─────────────────────────────────────────────────────────
function calcStreak(history){
  const days = new Set(history.map(h => h.date));
  let streak = 0;
  let cursor = new Date();
  cursor.setHours(0,0,0,0);
  const todayStr = cursor.toLocaleDateString("de-DE");
  if(!days.has(todayStr)) cursor.setDate(cursor.getDate() - 1);
  while(days.has(cursor.toLocaleDateString("de-DE"))){ streak++; cursor.setDate(cursor.getDate() - 1); }
  return streak;
}
function parseDeDate(str){ const parts = str.split("."); if(parts.length !== 3) return null; const [d, m, y] = parts.map(Number); if(!d || !m || !y) return null; return new Date(y, m - 1, d); }
function calcLongestStreak(history){
  if(history.length === 0) return 0;
  const dateSet = new Set(history.map(h => h.date));
  const dates = [...dateSet].map(parseDeDate).filter(Boolean).sort((a,b) => a - b);
  if(dates.length === 0) return 0;
  let longest = 1, current = 1;
  for(let i = 1; i < dates.length; i++){
    const diffDays = Math.round((dates[i] - dates[i-1]) / 86400000);
    if(diffDays === 1) current++;
    else if(diffDays > 1) current = 1;
    longest = Math.max(longest, current);
  }
  return longest;
}
const BADGES = [
  { id: "first-workout", icon: "🎉", name: "Erstes Training",  desc: "Schließe dein erstes Training ab",        check: (h) => h.length >= 1 },
  { id: "streak-3",      icon: "🔥", name: "3 Tage Streak",    desc: "Trainiere 3 Tage in Folge",               check: (h) => calcLongestStreak(h) >= 3 },
  { id: "streak-7",      icon: "🔥", name: "7 Tage Streak",    desc: "Trainiere 7 Tage in Folge",               check: (h) => calcLongestStreak(h) >= 7 },
  { id: "streak-30",     icon: "🏆", name: "30 Tage Streak",   desc: "Trainiere 30 Tage in Folge",              check: (h) => calcLongestStreak(h) >= 30 },
  { id: "total-10",      icon: "💪", name: "10 Trainings",     desc: "Schließe 10 Trainings ab",                check: (h) => h.length >= 10 },
  { id: "total-50",      icon: "🏅", name: "50 Trainings",     desc: "Schließe 50 Trainings ab",                check: (h) => h.length >= 50 },
  { id: "total-100",     icon: "👑", name: "100 Trainings",    desc: "Schließe 100 Trainings ab",               check: (h) => h.length >= 100 },

  { id: "night-owl",     icon: "🌙", name: "Nachteule",        desc: "Trainiere nach 21:00 Uhr",                check: (h) => h.some(e => parseInt(e.time, 10) >= 21) },
  { id: "marathon",      icon: "⏱️", name: "Marathon",         desc: "Schließe ein Training über 45 Min ab",    check: (h) => h.some(e => (e.durationSec||0) >= 45*60) },
];
function checkNewBadges(history, unlockedIds){ const unlockedSet = new Set(unlockedIds); return BADGES.filter(b => !unlockedSet.has(b.id) && b.check(history)); }

function speak(text){
  if(!window.speechSynthesis)return;
  if(window._fitTimerMuted)return;
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang="de-DE"; utt.rate=0.95; utt.pitch=1.0; utt.volume=1.0;
  setTimeout(()=>{ if(!window._fitTimerMuted)window.speechSynthesis.speak(utt); },300);
}

function getSystemTheme(){return window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";}
function loadTheme(){return localStorage.getItem("fit-theme")||"system";}
function saveTheme(t){localStorage.setItem("fit-theme",t);}
function resolveTheme(pref){return pref==="system"?getSystemTheme():pref;}

// ── YouTube ───────────────────────────────────────────────────────────────────
function extractYouTubeId(url){ if(!url||!url.trim())return null; const patterns=[/youtu\.be\/([\w-]{11})/,/[?&]v=([\w-]{11})/,/embed\/([\w-]{11})/,/shorts\/([\w-]{11})/]; for(const p of patterns){const m=url.match(p);if(m)return m[1];} return null; }
function youtubeEmbedUrl(url){ const id=extractYouTubeId(url); return id?`https://www.youtube-nocookie.com/embed/${id}?autoplay=0&rel=0&modestbranding=1`:null; }

const DEFAULT_ITEMS=[
  {type:"exercise",name:"Burpees",      workSec:20,restSec:10,sets:8},
  {type:"break",   durationSec:30},
  {type:"exercise",name:"Jumping Jacks",workSec:20,restSec:10,sets:8},
  {type:"break",   durationSec:30},
  {type:"exercise",name:"Plank",        workSec:20,restSec:10,sets:8},
  {type:"break",   durationSec:30},
  {type:"exercise",name:"Squats",       workSec:20,restSec:10,sets:8},
  {type:"break",   durationSec:30},
  {type:"exercise",name:"Lunges",       workSec:20,restSec:10,sets:8},
];
const DEFAULT_CONFIG={rounds:1,items:DEFAULT_ITEMS,restBetweenRounds:60,countdownSec:20,youtubeUrl:""};
function buildSequence(items){ const seq=[];let exIdx=0; for(const item of items){ if(item.type==="exercise")seq.push({kind:"exercise",exIdx:exIdx++,...item}); else if(item.type==="break")seq.push({kind:"break",durationSec:item.durationSec}); } return seq; }
function totalExercises(items){return items.filter(x=>x.type==="exercise").length;}
function totalWorkoutSec(cfg){ const seq=buildSequence(cfg.items); const perRound=seq.reduce((s,step)=>step.kind==="exercise"?s+step.sets*step.workSec+(step.sets-1)*step.restSec:s+step.durationSec,0); return perRound*cfg.rounds+(cfg.rounds-1)*cfg.restBetweenRounds; }
const PHASES={IDLE:"idle",COUNTDOWN:"countdown",WORK:"work",REST:"rest",EX_BREAK:"ex_break",ROUND_REST:"round_rest",DONE:"done"};
function pad(n){return String(n).padStart(2,"0");}
function fmtTime(s){return `${pad(Math.floor(s/60))}:${pad(s%60)}`;}
function sameDay(a, b){ return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate(); }
function buildWeekStats(history){
  const DAY_NAMES = ["So","Mo","Di","Mi","Do","Fr","Sa"];
  const today = new Date(); today.setHours(0,0,0,0);
  const days = [];
  for(let i = 6; i >= 0; i--){
    const d = new Date(today); d.setDate(today.getDate() - i);
    const entries = history.filter(h => { const hd = parseDeDate(h.date); return hd && sameDay(hd, d); });
    const totalSec = entries.reduce((s, h) => s + (h.durationSec || 0), 0);
    days.push({ label: DAY_NAMES[d.getDay()], isToday: i === 0, totalSec, count: entries.length });
  }
  return days;
}

  const showSync = (status) => {
    setSyncStatus(status);
    if (status === "saved") setTimeout(() => setSyncStatus(""), 2000);
  };

  const [badgeToast, setBadgeToast] = useState(null);
  const [showSaveDialog, setShowSaveDialog] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [saveName, setSaveName] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [renamingId, setRenamingId] = useState(null);
  const [renameVal, setRenameVal] = useState("");
  const [activeWorkoutName, setActiveWorkoutName] = useState("");
  const workoutStartRef = useRef(null);
  const [showMigration, setShowMigration] = useState(false);
  const [pendingImport, setPendingImport] = useState(null);
  const [showDeleteAccount, setShowDeleteAccount] = useState(false);
  const [profileName, setProfileName] = useState(user.name || "");
  const [profilePwOld, setProfilePwOld] = useState("");
  const [profilePwNew, setProfilePwNew] = useState("");
  const [profilePwNew2, setProfilePwNew2] = useState("");
  const [profileMsg, setProfileMsg] = useState({ type: "", text: "" });
  const [profileLoading, setProfileLoading] = useState(false);

  // Timer state
  const [phase, setPhase] = useState(PHASES.IDLE);
  const [round, setRound] = useState(1);
  const [seqIdx, setSeqIdx] = useState(0);
  const [exSet, setExSet] = useState(1);
  const [timeLeft, setTimeLeft] = useState(0);
  const [isPaused, setIsPaused] = useState(false);
  const [wakeLockStatus, setWakeLockStatus] = useState("idle");
  const [soundEnabled, setSoundEnabled] = useState(true);
  const audioCtxRef = useRef(null);
  const rafRef = useRef(null);
  const wakeLockRef = useRef(null);
  const stateRef = useRef({});
  const deadlineRef = useRef(null);
  const lastBeepSecRef = useRef(-1);
  const lastHalfBeepRef = useRef(-1);
  const dragIdx = useRef(null);

  useEffect(() => { stateRef.current = { phase, round, seqIdx, exSet, timeLeft, isPaused, config, soundEnabled }; });
  useEffect(() => { window._fitTimerMuted = !soundEnabled; if (!soundEnabled && window.speechSynthesis) window.speechSynthesis.cancel(); }, [soundEnabled]);
  useEffect(() => { if(!badgeToast) return; const t = setTimeout(() => setBadgeToast(null), 4000); return () => clearTimeout(t); }, [badgeToast]);

  // Browser tab title
  useEffect(() => {
    const seq = buildSequence(config.items);
    const step = seq[seqIdx];
    if (phase === PHASES.IDLE || phase === PHASES.DONE) { document.title = "Intervall & Tabata Coach"; }
    else {
      const name = step?.name || "";
      const label = phase === PHASES.WORK ? name : phase === PHASES.REST ? "Pause" : phase === PHASES.EX_BREAK ? "Pause" : phase === PHASES.ROUND_REST ? "Rundenpause" : "";
      document.title = `${fmtTime(Math.max(0, timeLeft))} – ${label}`;
    }
  }, [phase, timeLeft, seqIdx, config]);

  // Wake Lock
  const acquireWakeLock = useCallback(async () => {
    if (!("wakeLock" in navigator)) { setWakeLockStatus("denied"); return; }
    try {
      wakeLockRef.current = await navigator.wakeLock.request("screen");
      setWakeLockStatus("active");
      wakeLockRef.current.addEventListener("release", () => setWakeLockStatus("idle"));
    } catch { setWakeLockStatus("denied"); }
  }, []);
  const releaseWakeLock = useCallback(() => { wakeLockRef.current?.release(); wakeLockRef.current = null; setWakeLockStatus("idle"); }, []);
  useEffect(() => {
    const onVisible = async () => {
      if (document.visibilityState === "visible" && stateRef.current.phase !== PHASES.IDLE && stateRef.current.phase !== PHASES.DONE) {
        if (deadlineRef.current !== null && !stateRef.current.isPaused) {
          const drift = performance.now() - deadlineRef.current;
          if (drift > 100) { const sec = Math.floor(drift / 1000); if (sec > 0) advanceTimer(sec); deadlineRef.current = performance.now() + 1000; }
        }
        await acquireWakeLock();
      }
    };
    document.addEventListener("visibilitychange", onVisible);
    return () => document.removeEventListener("visibilitychange", onVisible);
  }, [acquireWakeLock]);

  const getAudioCtx = useCallback(() => {
    if (!audioCtxRef.current || audioCtxRef.current.state === "closed") audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtxRef.current.state === "suspended") audioCtxRef.current.resume();
    return audioCtxRef.current;
  }, []);

  // Transition logic (unchanged)
  const applyTransition = useCallback((s, ctx) => {
    const cfg = s.config, seq = buildSequence(cfg.items), step = seq[s.seqIdx];
    const isLastRound = s.round === cfg.rounds;
    if (s.phase === PHASES.COUNTDOWN) {
      if (ctx) { signalStart(ctx); speak(seq[0].name); }
      return { phase: PHASES.WORK, timeLeft: seq[0].workSec, seqIdx: 0, exSet: 1, round: s.round };
    }
    if (s.phase === PHASES.WORK) {
      const isLastSet = s.exSet >= step.sets;
      if (!isLastSet) { if (ctx) signalRest(ctx); return { phase: PHASES.REST, timeLeft: step.restSec, seqIdx: s.seqIdx, exSet: s.exSet, round: s.round }; }
      const nextIdx = s.seqIdx + 1;
      if (nextIdx >= seq.length) {
        if (isLastRound) { if (ctx) { signalDone(ctx); setTimeout(() => speak("Super, Training beendet!"), 600); } return { phase: PHASES.DONE, timeLeft: 0, seqIdx: s.seqIdx, exSet: s.exSet, round: s.round }; }
        if (ctx) signalRest(ctx);
        return { phase: PHASES.ROUND_REST, timeLeft: cfg.restBetweenRounds, seqIdx: s.seqIdx, exSet: s.exSet, round: s.round };
      }
      const nextStep = seq[nextIdx];
      if (nextStep.kind === "break") {
        if (ctx) { signalRest(ctx); const ab = seq[nextIdx + 1]; if (ab) setTimeout(() => speak("Pause. Weiter mit " + ab.name), 400); }
        return { phase: PHASES.EX_BREAK, timeLeft: nextStep.durationSec, seqIdx: nextIdx, exSet: 1, round: s.round };
      }
      if (ctx) { signalRest(ctx); setTimeout(() => speak("Weiter mit " + nextStep.name), 400); }
      return { phase: PHASES.EX_BREAK, timeLeft: 0, seqIdx: nextIdx, exSet: 1, round: s.round };
    }
    if (s.phase === PHASES.REST) { if (ctx) signalStart(ctx); return { phase: PHASES.WORK, timeLeft: step.workSec, seqIdx: s.seqIdx, exSet: s.exSet + 1, round: s.round }; }
    if (s.phase === PHASES.EX_BREAK) {
      let ni = s.seqIdx; if (seq[ni] && seq[ni].kind === "break") ni++;
      const nx = seq[ni];
      if (!nx) return { phase: PHASES.DONE, timeLeft: 0, seqIdx: s.seqIdx, exSet: 1, round: s.round };
      if (ctx) { signalStart(ctx); speak(nx.name); }
      return { phase: PHASES.WORK, timeLeft: nx.workSec, seqIdx: ni, exSet: 1, round: s.round };
    }
    if (s.phase === PHASES.ROUND_REST) {
      if (ctx) { signalStart(ctx); speak(seq[0].name); }
      return { phase: PHASES.WORK, timeLeft: seq[0].workSec, seqIdx: 0, exSet: 1, round: s.round + 1 };
    }
    return null;
  }, []);

  const advanceTimer = useCallback(seconds => {
    let s = { ...stateRef.current };
    for (let i = 0; i < seconds; i++) {
      if (s.phase === PHASES.DONE || s.phase === PHASES.IDLE) break;
      s = { ...s, timeLeft: s.timeLeft - 1 };
      if (s.timeLeft <= 0) { const n = applyTransition(s, null); if (!n) break; s = { ...s, ...n }; if (s.phase === PHASES.DONE) break; }
    }
    setPhase(s.phase); setRound(s.round); setSeqIdx(s.seqIdx); setExSet(s.exSet); setTimeLeft(Math.max(0, s.timeLeft));
  }, [applyTransition]);

  const stopTimer = useCallback(() => { if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; } deadlineRef.current = null; }, []);

  const tick = useCallback(() => {
    const now = performance.now(), s = stateRef.current;
    if (s.isPaused || s.phase === PHASES.IDLE || s.phase === PHASES.DONE) { rafRef.current = requestAnimationFrame(tick); return; }
    if (deadlineRef.current === null) { deadlineRef.current = now + 1000; rafRef.current = requestAnimationFrame(tick); return; }
    if (now >= deadlineRef.current) {
      const next = s.timeLeft - 1;
      const bk = `${s.phase}-${next}`;
      if (next > 0 && next <= 3 && lastBeepSecRef.current !== bk) { lastBeepSecRef.current = bk; if (stateRef.current.soundEnabled) signalCountdown(getAudioCtx()); }
      if (s.phase === PHASES.WORK) {
        const seqNow = buildSequence(s.config.items); const curStep = seqNow[s.seqIdx];
        if (curStep && curStep.halfTimeSignal) {
          const halfPoint = Math.floor(curStep.workSec / 2); const hbk = `half-${s.seqIdx}-${s.exSet}`;
          if (next === halfPoint && halfPoint > 0 && lastHalfBeepRef.current !== hbk) { lastHalfBeepRef.current = hbk; if (stateRef.current.soundEnabled) signalHalfTime(getAudioCtx()); }
        }
      }
      if (next <= 0) {
        const result = applyTransition(s, stateRef.current.soundEnabled ? getAudioCtx() : null);
        if (result) {
          lastBeepSecRef.current = -1; lastHalfBeepRef.current = -1;
          setPhase(result.phase); setRound(result.round); setSeqIdx(result.seqIdx); setExSet(result.exSet); setTimeLeft(result.timeLeft);
          if (result.phase === PHASES.DONE) {
            // ── Save session to API ───────────────────────────────────────
            if (workoutStartRef.current) {
              const dur = Math.round((Date.now() - workoutStartRef.current) / 1000);
              const entry = {
                id: Date.now(),
                name: stateRef.current.config._name || "Training",
                date: new Date().toLocaleDateString("de-DE"),
                time: new Date().toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" }),
                durationSec: dur,
                exercises: totalExercises(stateRef.current.config.items),
                rounds: stateRef.current.config.rounds
              };
              setHistory(prev => {
                const updated = [entry, ...prev].slice(0, 200);
                // Check badges
                setUnlockedBadges(prevBadges => {
                  const newOnes = checkNewBadges(updated, prevBadges);
                  if (newOnes.length > 0) {
                    setBadgeToast(newOnes[0]);
                    // Save new badges to API
                    newOnes.forEach(b => apiRequest("POST", "/badges", { badge_id: b.id }).catch(() => {}));
                    return [...prevBadges, ...newOnes.map(b => b.id)];
                  }
                  return prevBadges;
                });
                // Save session to API
                apiRequest("POST", "/sessions", {
                  workout_name: entry.name,
                  duration_sec: dur,
                  sets_done: totalExercises(stateRef.current.config.items),
                  rounds_done: stateRef.current.config.rounds
                }).catch(() => {});
                return updated;
              });
              workoutStartRef.current = null;
            }
            stopTimer(); return;
          }
        }
      } else { setTimeLeft(next); }
      deadlineRef.current += 1000;
    }
    rafRef.current = requestAnimationFrame(tick);
  }, [getAudioCtx, applyTransition, stopTimer]);

  const startTick = useCallback(() => { stopTimer(); deadlineRef.current = null; lastBeepSecRef.current = -1; lastHalfBeepRef.current = -1; rafRef.current = requestAnimationFrame(tick); }, [stopTimer, tick]);

  const handleSkip = useCallback(() => {
    const s = stateRef.current;
    if (s.phase === PHASES.IDLE || s.phase === PHASES.DONE) return;
    const result = applyTransition({ ...s, timeLeft: 0 }, stateRef.current.soundEnabled ? getAudioCtx() : null);
    if (result) { lastBeepSecRef.current = -1; lastHalfBeepRef.current = -1; setPhase(result.phase); setRound(result.round); setSeqIdx(result.seqIdx); setExSet(result.exSet); setTimeLeft(result.timeLeft); deadlineRef.current = performance.now() + 1000; if (result.phase === PHASES.DONE) stopTimer(); }
  }, [applyTransition, getAudioCtx, stopTimer]);

  const handleStart = useCallback(async () => {
    getAudioCtx(); await acquireWakeLock();
    setRound(1); setSeqIdx(0); setExSet(1); setIsPaused(false);
    setPhase(PHASES.COUNTDOWN); setTimeLeft(config.countdownSec); startTick();
    workoutStartRef.current = Date.now();
    const seq = buildSequence(config.items);
    if (seq[0]) setTimeout(() => speak(seq[0].name), 500);
  }, [config, getAudioCtx, acquireWakeLock, startTick]);

  const handlePause = useCallback(() => {
    setIsPaused(p => { if (!p) { deadlineRef.current = null; } else { deadlineRef.current = performance.now() + 1000; } return !p; });
  }, []);

  const handleReset = useCallback(() => {
    stopTimer(); releaseWakeLock();
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    setPhase(PHASES.IDLE); setRound(1); setSeqIdx(0); setExSet(1); setTimeLeft(0); setIsPaused(false);
    workoutStartRef.current = null; document.title = "Intervall & Tabata Coach";
  }, [stopTimer, releaseWakeLock]);

  useEffect(() => () => { stopTimer(); releaseWakeLock(); }, [stopTimer, releaseWakeLock]);

  // ── Workout save/load (API) ───────────────────────────────────────────────
  const handleSaveWorkout = async () => {
    showSync("saving");
    try {
      const isUpdate = !!editingId;
      const existing = savedWorkouts.find(w => w.id === editingId);
      const finalName = saveName.trim() || existing?.name || "Training";
      if (!isUpdate && !saveName.trim()) return;

      const payload = {
        name: finalName,
        config_rounds: editConfig.rounds,
        config_rest_between_rounds: editConfig.restBetweenRounds,
        config_countdown_sec: editConfig.countdownSec,
        config_youtube_url: editConfig.youtubeUrl || "",
        exercises: editConfig.items.map((item, i) => ({
          position: i,
          type: item.type,
          name: item.name || null,
          duration_sec: item.type === "exercise" ? item.workSec : item.durationSec,
          rest_sec: item.restSec || 0,
          sets: item.sets || 1,
          half_time_signal: item.halfTimeSignal || false,
          legacy_id: item._id || null
        }))
      };

      let saved;
      if (isUpdate) {
        saved = await apiRequest("PUT", `/workouts/${editingId}`, payload);
        setSavedWorkouts(prev => prev.map(w => w.id === editingId ? {
          ...w, name: finalName,
          config: { ...editConfig, _name: finalName, items: editConfig.items.map(i => ({ ...i })) }
        } : w));
        setEditingId(null);
      } else {
        saved = await apiRequest("POST", "/workouts", payload);
        const newWorkout = {
          id: saved.id,
          name: finalName,
          createdAt: new Date().toLocaleDateString("de-DE"),
          config: { ...editConfig, _name: finalName, items: editConfig.items.map(i => ({ ...i })) }
        };
        setSavedWorkouts(prev => [newWorkout, ...prev]);
      }
      showSync("saved");
